<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoFashion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="">LudoFashion</a>
        <!-- campo de pesquisa -->
        <form action="" id="form-buscar">
            <input type="search" name="buscar" id="buscar" placeholder="Buscar...">
            <button type="submit" id="btn-buscar"><img src="image/search.png" alt=""  width="30px"></button>
        </form>
            
           
        <a href="#" class="icon-link">
            <img src="image/person.png" alt="pessoa" width="40px">
            Cadastro
        </a>

        <a href="" class="icon-link">
            <img src="image/ajuda.png" alt="sinal de interrogação" width="40px">
            Dúvidas
        </a>
              
    </header>
    
    <nav>
        <a href="home">Catálogo</a>
        <a href="sobrealoja">Sobre a Loja</a>
    </nav>

    <main>
        <section id="banner">

            <div id="txt-banner">
                <p style="font-size: 70px;">PROMOÇÃO</p>
                <p style="font-size: 70px;">50%</p>
                <p>OFF</p>
                <p>Desconto em toda coleção de verão</p>

            </div>
        </section>

        <section class="conteudo">
            <h1>Desconto em toda coleção de verão</h1>
            <div class="card-container">
                <div class="card">

                    <div class="card-img">
                        <img src="image/mulher-rosa.jpg" alt="">
                    </div>

                    <div class="card-content">
                        <p>R$ 500</p>
                    </div>

                </div>
            </div>
            
        </section>
    </main>

    <footer>
        <p>&copy; 2024 LudoFashion. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
